<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마음날씨</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #eaf4ff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 48px 32px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
  }
  h1 { font-size: 1.6rem; color: #1a5276; margin-bottom: 6px; }
  .sub { color: #999; font-size: 0.9rem; margin-bottom: 32px; }

  .upload-area {
    border: 2px dashed #b8d9f5;
    border-radius: 16px;
    padding: 44px 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .upload-area:hover { border-color: #3498db; background: #f0f8ff; }
  .upload-area .icon { font-size: 3rem; display: block; margin-bottom: 10px; }
  .upload-area p { color: #888; font-size: 0.95rem; }
  input[type=file] { display: none; }

  #msg {
    display: none;
    margin-top: 28px;
    padding: 24px;
    background: #eafaf1;
    border: 2px solid #27ae60;
    border-radius: 16px;
    font-size: 1.2rem;
    font-weight: 700;
    color: #1e8449;
    line-height: 1.6;
  }
  #msg .phone { font-size: 2rem; display: block; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="card">
  <h1>🌤️ 마음날씨</h1>
  <p class="sub">사진을 올려주세요</p>
  <label>
    <div class="upload-area">
      <span class="icon">📷</span>
      <p>사진을 눌러 업로드하세요</p>
    </div>
    <input type="file" accept="image/*" onchange="showMsg()">
  </label>
  <div id="msg">
    <span class="phone">📞</span>
    담당공무원으로부터<br>전화가 왔습니다.
  </div>
</div>
<script>
  function showMsg() {
    document.getElementById('msg').style.display = 'block';
  }
</script>
</body>
</html>
